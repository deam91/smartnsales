events {}

http {
    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        client_max_body_size 10m;

        # /api/* and the Django admin → Django. proxy_set_header overwrites
        # X-Forwarded-Proto (clients can't spoof it; backend isn't published).
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Django admin static (runserver serves it in dev; collectstatic in prod).
        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else → Next.js, with WebSocket upgrade for HMR.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
