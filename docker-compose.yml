services:
  db:
    image: postgres:17-alpine
    env_file: ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    # No published port: reachable only via nginx on the internal network.
    expose:
      - "8000"
    healthcheck:
      test:
        ["CMD", "python", "-c",
         "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health/').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"  # the only published port — http://localhost:3000
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
