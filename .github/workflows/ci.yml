name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smartnsales
          POSTGRES_USER: smartnsales
          POSTGRES_PASSWORD: smartnsales
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U smartnsales"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      DJANGO_SECRET_KEY: ci-secret-key
      # No REDIS_URL → LocMemCache, so CI needs no Redis service.
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
